name: Release

on:
  push:
    branches:
      - dev
  release:
    types: [published]

env:
  # Dev pushes include debug symbols; releases are optimized-only
  BUILD_TYPE: ${{ github.event_name == 'release' && 'Release' || 'RelWithDebInfo' }}

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Install Qt6 and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            libgsl-dev \
            qt6-base-dev \
            qt6-svg-dev \
            qt6-tools-dev \
            libgl1-mesa-dev \
            libopengl0 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-keysyms1 \
            libxcb-shape0 \
            fuse \
            file

      - name: Cache Qwt-Qt6
        id: cache-qwt
        uses: actions/cache@v5
        with:
          path: ~/qwt-qt6-install
          key: ${{ runner.os }}-qwt-qt6-6.3.0

      - name: Build Qwt-Qt6
        if: steps.cache-qwt.outputs.cache-hit != 'true'
        run: |
          cd ~
          wget https://downloads.sourceforge.net/project/qwt/qwt/6.3.0/qwt-6.3.0.tar.bz2
          tar xjf qwt-6.3.0.tar.bz2
          cd qwt-6.3.0
          /usr/lib/qt6/bin/qmake qwt.pro
          make -j$(nproc)
          # Use INSTALL_ROOT to redirect install to a writable staging directory
          make install INSTALL_ROOT=$HOME/qwt-staging
          # Copy from staging to expected cache location
          cp -a $HOME/qwt-staging/usr/local/qwt-6.3.0 $HOME/qwt-qt6-install

      - name: Build Strata
        run: |
          mkdir build
          cd build
          cmake .. \
            -GNinja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_PREFIX_PATH="~/qwt-qt6-install" \
            -DQWT_INCLUDE_DIR="$HOME/qwt-qt6-install/include" \
            -DQWT_LIBRARY="$HOME/qwt-qt6-install/lib/libqwt.so" \
            -DCMAKE_INSTALL_PREFIX=AppDir/usr
          cmake --build . --parallel
          cmake --install .

      - name: Create AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd build
          wget -c "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          wget -c "https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage"
          chmod +x linuxdeploy*.AppImage
          export VERSION=$(git describe --tags --always)
          export QMAKE=/usr/lib/qt6/bin/qmake
          export LD_LIBRARY_PATH=$HOME/qwt-qt6-install/lib:$LD_LIBRARY_PATH
          export EXTRA_QT_PLUGINS="iconengines;platformthemes"
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin qt \
            --output appimage

      - name: Create tarball
        run: |
          cd build
          export VERSION=$(git describe --tags --always)
          tar czf Strata-${VERSION}-linux-x86_64.tar.gz -C AppDir/usr .

      - name: Create portable tarball (no FUSE needed)
        run: |
          cd build
          export VERSION=$(git describe --tags --always)
          # Extract AppImage so it can run without FUSE (e.g., in VMs)
          chmod +x Strata-${VERSION}-x86_64.AppImage
          ./Strata-${VERSION}-x86_64.AppImage --appimage-extract
          mv squashfs-root Strata-${VERSION}-portable
          # Add a convenience launcher script
          cat > Strata-${VERSION}-portable/strata.sh << 'LAUNCHER'
          #!/bin/sh
          HERE="$(cd "$(dirname "$0")" && pwd)"
          # Use software rendering if no GPU is available (e.g., in VMs)
          if ! glxinfo -B 2>/dev/null | grep -q "direct rendering: Yes"; then
            export LIBGL_ALWAYS_SOFTWARE=1
          fi
          exec "$HERE/AppRun" "$@"
          LAUNCHER
          chmod +x Strata-${VERSION}-portable/strata.sh
          tar czf Strata-${VERSION}-linux-x86_64-portable.tar.gz Strata-${VERSION}-portable

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/Strata-*-x86_64.AppImage
            build/Strata-*-linux-x86_64.tar.gz
            build/Strata-*-linux-x86_64-portable.tar.gz

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: strata-linux
          path: |
            build/Strata-*-x86_64.AppImage
            build/Strata-*-linux-x86_64.tar.gz
            build/Strata-*-linux-x86_64-portable.tar.gz

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v5

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.2'
          arch: 'win64_msvc2019_64'
          tools: 'tools_ifw'

      - name: Cache dependencies
        id: cache-deps
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/deps
          key: ${{ runner.os }}-qt6-deps-v2

      - name: Build dependencies (Qwt & GSL)
        if: steps.cache-deps.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          mkdir deps
          cd deps

          # Build GSL
          git clone https://github.com/ampl/gsl.git
          cd gsl
          git submodule update --init --recursive
          mkdir build
          cd build
          cmake .. `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DGSL_DISABLE_WARNINGS:BOOL=ON `
            -DBUILD_SHARED_LIBS:BOOL=ON `
            -DMSVC_RUNTIME_DYNAMIC:BOOL=ON `
            -DCMAKE_BUILD_TYPE=Release `
            -DGSL_DISABLE_TESTS=1 `
            -DNO_AMPL_BINDINGS=1 `
            -DDOCUMENTATION=OFF
          cmake --build . --config Release
          cmake --install . --prefix "C:/GSL"
          cd ../../..

          # Build Qwt
          cd deps
          git clone --depth 1 --branch v6.3.0 https://git.code.sf.net/p/qwt/git qwt-6.3.0
          cd qwt-6.3.0
          qmake CONFIG+=release qwt.pro
          nmake
          nmake install
          # Rename from -dev suffix to expected path
          Rename-Item "C:\Qwt-6.3.0-dev" "C:\Qwt-6.3.0"

      - name: Install dependencies
        shell: pwsh
        run: |
          cd deps/gsl/build
          cmake --install . --prefix "C:/GSL"

          # Install Qwt from cached build (nmake install is unreliable from cache)
          $qwtDir = "C:\Qwt-6.3.0"
          if (Test-Path $qwtDir) { Remove-Item -Recurse -Force $qwtDir }
          New-Item -ItemType Directory -Path "$qwtDir\include" -Force | Out-Null
          New-Item -ItemType Directory -Path "$qwtDir\lib" -Force | Out-Null
          Push-Location ${{ github.workspace }}/deps/qwt-6.3.0
          Copy-Item "src\*.h" -Destination "$qwtDir\include\"
          Copy-Item "lib\qwt.lib" -Destination "$qwtDir\lib\"
          Copy-Item "lib\qwt.dll" -Destination "$qwtDir\lib\"
          Pop-Location

          # Verify Qwt headers are present
          if (-not (Test-Path "$qwtDir\include\qwt_plot.h")) {
            Write-Error "Qwt headers not found at $qwtDir\include\"
            exit 1
          }
          Write-Host "Qwt installed: $(Get-ChildItem $qwtDir\include\*.h | Measure-Object | Select-Object -ExpandProperty Count) headers"

      - name: Build Strata
        shell: pwsh
        run: |
          $VERSION = git describe --tags --always
          mkdir build
          cd build
          cmake .. `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DQT_DIR="${{ env.QT_ROOT_DIR }}/lib/cmake/Qt6" `
            -DQWT_ROOT_DIR="C:/Qwt-6.3.0" `
            -DQWT_INCLUDE_DIR="C:/Qwt-6.3.0/include" `
            -DQWT_LIBRARY="C:/Qwt-6.3.0/lib/qwt.lib" `
            -DGSL_ROOT_DIR="C:/GSL" `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_INSTALL_PREFIX=install
          cmake --build . --config ${{ env.BUILD_TYPE }} --parallel
          cmake --install . --config ${{ env.BUILD_TYPE }}

      - name: Copy runtime dependencies
        shell: pwsh
        run: |
          cd build/install/bin
          Copy-Item "C:/Qwt-6.3.0/lib/qwt.dll" -Destination "."
          Copy-Item "C:/GSL/bin/*.dll" -Destination "."
          # Deploy Qt dependencies using windeployqt
          & "${{ env.QT_ROOT_DIR }}/bin/windeployqt.exe" strata.exe --release
          # Copy Qt6OpenGLWidgets.dll that windeployqt may miss (transitive via Qwt)
          Copy-Item "${{ env.QT_ROOT_DIR }}/bin/Qt6OpenGLWidgets.dll" -Destination "."
          Copy-Item "${{ env.QT_ROOT_DIR }}/bin/Qt6OpenGL.dll" -Destination "."

      - name: Create ZIP archive
        shell: pwsh
        run: |
          $VERSION = git describe --tags --always
          Compress-Archive -Path build/install/* -DestinationPath "Strata-${VERSION}-windows-x64.zip"

      - name: Create installer with NSIS
        shell: pwsh
        run: |
          $VERSION = git describe --tags --always
          choco install nsis -y
          # Prepare installer files
          mkdir installer-temp
          Copy-Item -Recurse build/install/* installer-temp/
          # Create basic NSIS script for Qt6
          @"
          !define PRODUCT_NAME "Strata"
          !define PRODUCT_VERSION "$VERSION"
          !define PRODUCT_PUBLISHER "Albert Kottke"

          OutFile "Strata-${VERSION}-windows-x64-installer.exe"
          InstallDir "`$PROGRAMFILES64\Strata"

          Section "Main"
            SetOutPath "`$INSTDIR"
            File /r "installer-temp\*.*"
            CreateDirectory "`$SMPROGRAMS\Strata"
            CreateShortcut "`$SMPROGRAMS\Strata\Strata.lnk" "`$INSTDIR\bin\strata.exe"
            WriteUninstaller "`$INSTDIR\Uninstall.exe"
          SectionEnd

          Section "Uninstall"
            Delete "`$INSTDIR\Uninstall.exe"
            RMDir /r "`$INSTDIR"
            Delete "`$SMPROGRAMS\Strata\Strata.lnk"
            RMDir "`$SMPROGRAMS\Strata"
          SectionEnd
          "@ | Out-File -Encoding ASCII installer.nsi

          & "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Strata-*-windows-x64-installer.exe
            Strata-*-windows-x64.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: strata-windows
          path: |
            Strata-*-windows-x64-installer.exe
            Strata-*-windows-x64.zip

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          brew install qt@6 gsl cmake ninja dylibbundler
          brew link qt@6

      - name: Cache Qwt-Qt6
        id: cache-qwt
        uses: actions/cache@v5
        with:
          path: ~/qwt-qt6-install
          key: ${{ runner.os }}-qwt-qt6-6.3.0-no-framework

      - name: Build Qwt-Qt6
        if: steps.cache-qwt.outputs.cache-hit != 'true'
        run: |
          cd ~
          curl -L https://downloads.sourceforge.net/project/qwt/qwt/6.3.0/qwt-6.3.0.tar.bz2 -o qwt-6.3.0.tar.bz2
          tar xjf qwt-6.3.0.tar.bz2
          cd qwt-6.3.0
          # Disable framework build so Qwt installs as a plain dylib
          sed -i '' '/QwtFramework/d' qwtconfig.pri
          $(brew --prefix qt@6)/bin/qmake qwt.pro
          make -j$(sysctl -n hw.ncpu)
          # Use INSTALL_ROOT to redirect install to a writable staging directory
          make install INSTALL_ROOT=$HOME/qwt-staging
          # Copy from staging to expected cache location
          cp -a $HOME/qwt-staging/usr/local/qwt-6.3.0 $HOME/qwt-qt6-install

      - name: Build Strata
        run: |
          export Qt6_DIR=$(brew --prefix qt@6)/lib/cmake/Qt6
          export VERSION=$(git describe --tags --always)

          mkdir build
          cd build
          cmake .. \
            -GNinja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_PREFIX_PATH="~/qwt-qt6-install;$(brew --prefix qt@6)" \
            -DQWT_INCLUDE_DIR="$HOME/qwt-qt6-install/include" \
            -DQWT_LIBRARY="$HOME/qwt-qt6-install/lib/libqwt.dylib" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DCMAKE_INSTALL_PREFIX=staging
          cmake --build . --parallel
          cmake --install .

      - name: Create .app bundle
        run: |
          cd build
          export VERSION=$(git describe --tags --always)

          # cmake --install deployed Qt frameworks via qt_generate_deploy_app_script
          cp -a staging/strata.app strata.app

          # Remove QML frameworks that macdeployqt may pull in unnecessarily
          rm -rf strata.app/Contents/Frameworks/QtQml*.framework
          rm -rf strata.app/Contents/Frameworks/QtQuick*.framework
          rm -rf strata.app/Contents/Resources/qml

          # Fix Qt framework layouts for codesign --verify --strict --deep
          "${GITHUB_WORKSPACE}/scripts/fix_macos_frameworks.sh" strata.app

          # Bundle all non-system dylib dependencies (Qwt, GSL, and any
          # transitive deps) into the .app.  dylibbundler recursively
          # discovers, copies, and rewrites all references.
          dylibbundler \
            -od -b \
            -x strata.app/Contents/MacOS/strata \
            -d strata.app/Contents/Frameworks/ \
            -p @executable_path/../Frameworks/ \
            -s ~/qwt-qt6-install/lib \
            -s $(brew --prefix gsl)/lib

          # Also fix any bundled dylibs that reference other bundled dylibs
          # (e.g. libqwt links to Qt frameworks with absolute homebrew paths)
          for dylib in strata.app/Contents/Frameworks/*.dylib; do
            dylibbundler \
              -of -b \
              -x "$dylib" \
              -d strata.app/Contents/Frameworks/ \
              -p @executable_path/../Frameworks/ \
              -s ~/qwt-qt6-install/lib \
              -s $(brew --prefix gsl)/lib 2>/dev/null || true
          done

          # Ad-hoc code sign (required for Apple Silicon, helps on Intel)
          # Sign inside-out: framework binaries, then frameworks, then dylibs,
          # then the top-level app.  Avoid --deep on the final sign so that
          # already-signed sub-components are not re-signed with mismatched flags.
          for fw in strata.app/Contents/Frameworks/*.framework; do
            name=$(basename "$fw" .framework)
            if [ -f "$fw/Versions/A/$name" ]; then
              codesign --force --sign - "$fw/Versions/A/$name"
            fi
            codesign --force --sign - "$fw"
          done
          find strata.app/Contents/Frameworks -name '*.dylib' -maxdepth 1 | while read dl; do
            codesign --force --sign - "$dl"
          done
          codesign --force --sign - strata.app

          # Quick verification before packaging
          codesign --verify --strict --deep --verbose=2 strata.app

      # The DMG is not code-signed/notarized, so direct downloads trigger
      # Gatekeeper's "damaged" warning.  Install via Homebrew instead:
      #   brew install --cask arkottke/strata/strata

      - name: Create DMG
        run: |
          cd build
          export VERSION=$(git describe --tags --always)

          # Create temporary DMG directory — use ditto to preserve
          # code signatures, extended attributes, and resource forks
          mkdir dmg-temp
          ditto strata.app dmg-temp/strata.app
          ln -s /Applications dmg-temp/Applications

          # Create DMG
          hdiutil create -volname "Strata" -srcfolder dmg-temp -ov -format UDZO "Strata-${VERSION}-macos.dmg"

      - name: Create tarball
        run: |
          cd build
          export VERSION=$(git describe --tags --always)
          tar czf "Strata-${VERSION}-macos.tar.gz" strata.app

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/Strata-*-macos.dmg
            build/Strata-*-macos.tar.gz

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: strata-macos
          path: |
            build/Strata-*-macos.dmg
            build/Strata-*-macos.tar.gz

  # Smoke tests: verify built artifacts can actually launch
  test-linux:
    needs: build-linux
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: strata-linux

      - name: Test AppImage (with FUSE)
        run: |
          sudo apt-get update && sudo apt-get install -y fuse libfuse2 \
            libegl1-mesa libgl1-mesa-glx libxkbcommon0
          chmod +x Strata-*-x86_64.AppImage
          # Use virtual framebuffer since there's no display
          export QT_QPA_PLATFORM=offscreen
          ./Strata-*-x86_64.AppImage --help
          echo "AppImage launched successfully"

      - name: Test portable tarball (no FUSE, simulates VM)
        run: |
          tar xzf Strata-*-linux-x86_64-portable.tar.gz
          export QT_QPA_PLATFORM=offscreen
          export LIBGL_ALWAYS_SOFTWARE=1

          # Verify no missing shared libraries
          APPDIR=$(ls -d Strata-*-portable)
          MISSING=$(LD_LIBRARY_PATH="$APPDIR/usr/lib:$APPDIR/lib" ldd "$APPDIR/usr/bin/strata" 2>&1 | grep 'not found' || true)
          if [ -n "$MISSING" ]; then
            echo "ERROR: Missing shared libraries:"
            echo "$MISSING"
            exit 1
          fi
          echo "All shared libraries resolved"

          ./Strata-*-portable/AppRun --help
          echo "Portable bundle launched successfully"

  test-linux-minimal:
    needs: build-linux
    runs-on: ubuntu-22.04
    container:
      image: ubuntu:22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: strata-linux

      - name: Test portable tarball in minimal container (simulates VM without FUSE)
        run: |
          apt-get update && apt-get install -y libgl1-mesa-glx libegl1-mesa libxcb-xinerama0 libxkbcommon0 libfontconfig1
          tar xzf Strata-*-linux-x86_64-portable.tar.gz
          export QT_QPA_PLATFORM=offscreen
          export LIBGL_ALWAYS_SOFTWARE=1
          ./Strata-*-portable/AppRun --help
          echo "Portable bundle works in minimal container"

  test-macos:
    needs: build-macos
    runs-on: macos-14
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: strata-macos

      - name: Remove system libraries that could mask bundling problems
        run: |
          # Uninstall libraries that the build job used so they cannot
          # silently satisfy missing references at runtime via DYLD fallback.
          brew uninstall --ignore-dependencies gsl qwt qt@6 2>/dev/null || true
          # Double-check nothing lingers
          for lib in libqwt libgsl libgslcblas; do
            if find /usr/local /opt/homebrew -name "${lib}*" 2>/dev/null | grep -q .; then
              echo "WARNING: ${lib} still found on system after uninstall"
            fi
          done

      - name: Test .app bundle from tarball
        run: |
          tar xzf Strata-*-macos.tar.gz

          # --- 1. Verify code signature ---
          codesign --verify --strict --deep strata.app
          echo "Bundle signature verified"

          # --- 2. Verify expected libraries are bundled ---
          FW=strata.app/Contents/Frameworks
          MISSING=0
          for pattern in 'libqwt*dylib' 'libgsl.*dylib' 'libgslcblas*dylib'; do
            # Use ls to check glob (handles versioned sonames like libqwt.6.dylib)
            if ! ls $FW/$pattern 1>/dev/null 2>&1; then
              echo "ERROR: no match for $pattern in Frameworks/"
              MISSING=1
            else
              ls $FW/$pattern
            fi
          done
          [ $MISSING -eq 0 ] || exit 1

          # --- 3. Check ALL Mach-O binaries for absolute build-machine paths ---
          ERRORS=0
          # Collect every Mach-O binary in the bundle
          while IFS= read -r bin; do
            if otool -L "$bin" 2>/dev/null | tail -n +2 | grep -E '/usr/local|/opt/homebrew|/Users|/nix/store'; then
              echo "ERROR: absolute library path in: $bin"
              otool -L "$bin" | grep -E '/usr/local|/opt/homebrew|/Users|/nix/store'
              ERRORS=1
            fi
          done < <(find strata.app -type f \( -name '*.dylib' -o -perm +111 \) | while read f; do
            file "$f" | grep -q 'Mach-O' && echo "$f"
          done)
          [ $ERRORS -eq 0 ] || { echo "Absolute path check failed"; exit 1; }
          echo "No absolute library paths found in any Mach-O binary"

          # --- 4. Launch test with system fallback paths explicitly cleared ---
          export QT_QPA_PLATFORM=offscreen
          export DYLD_FALLBACK_LIBRARY_PATH=""
          export DYLD_LIBRARY_PATH=""
          # Trace loaded libraries to detect any unexpected system loads
          DYLD_PRINT_LIBRARIES=1 ./strata.app/Contents/MacOS/strata --help 2>dyld_trace.log
          echo "macOS app launched successfully"

          # Verify no libraries were loaded from outside the bundle (except OS frameworks)
          if grep -E '/usr/local|/opt/homebrew|/Users' dyld_trace.log; then
            echo "ERROR: App loaded libraries from outside the bundle at runtime"
            cat dyld_trace.log
            exit 1
          fi
          echo "Runtime library check passed"

      - name: Verify DMG mounts and launches
        run: |
          hdiutil attach Strata-*-macos.dmg -mountpoint /tmp/strata-dmg
          ls -la /tmp/strata-dmg/strata.app
          file /tmp/strata-dmg/strata.app/Contents/MacOS/strata
          codesign --verify --strict --deep --verbose=2 /tmp/strata-dmg/strata.app
          echo "Bundle signature verified"

          # Launch from the DMG to verify it works read-only
          export QT_QPA_PLATFORM=offscreen
          export DYLD_FALLBACK_LIBRARY_PATH=""
          export DYLD_LIBRARY_PATH=""
          /tmp/strata-dmg/strata.app/Contents/MacOS/strata --help
          echo "DMG app launched successfully"

          hdiutil detach /tmp/strata-dmg

  test-windows:
    needs: build-windows
    runs-on: windows-2022
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: strata-windows

      - name: Verify required DLLs are bundled
        shell: pwsh
        run: |
          Expand-Archive -Path (Get-ChildItem "Strata-*-windows-x64.zip" | Select-Object -First 1).FullName -DestinationPath install
          $exe = Get-ChildItem -Path install -Recurse -Filter "strata.exe" | Select-Object -First 1
          if (-not $exe) { Write-Error "strata.exe not found"; exit 1 }
          Write-Host "Found: $($exe.FullName)"

          # Verify critical DLLs are present
          $requiredDlls = @("qwt.dll", "gsl.dll", "gslcblas.dll", "Qt6Core.dll", "Qt6Widgets.dll")
          $missingDlls = @()
          foreach ($dll in $requiredDlls) {
            if (-not (Test-Path (Join-Path $exe.DirectoryName $dll))) {
              $missingDlls += $dll
            }
          }
          if ($missingDlls.Count -gt 0) {
            Write-Error "Missing required DLLs: $($missingDlls -join ', ')"
            exit 1
          }
          Write-Host "All required DLLs present"
          Get-ChildItem $exe.DirectoryName -Filter "*.dll" | ForEach-Object { Write-Host "  DLL: $($_.Name)" }

      - name: Test executable launches
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path install -Recurse -Filter "strata.exe" | Select-Object -First 1
          $env:QT_QPA_PLATFORM = "offscreen"
          # Run and capture exit code properly — do not mask failures
          $proc = Start-Process -FilePath $exe.FullName -ArgumentList "--help" -Wait -PassThru -NoNewWindow
          if ($proc.ExitCode -ne 0) {
            Write-Error "strata.exe exited with code $($proc.ExitCode)"
            exit 1
          }
          Write-Host "Windows executable launched successfully"

  update-homebrew:
    if: github.event_name == 'release'
    needs: [build-macos, test-macos]
    runs-on: ubuntu-24.04
    steps:
      - name: Update Homebrew cask
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          # Extract version from release tag (strip leading 'v')
          VERSION="${GITHUB_REF_NAME#v}"
          DMG_URL="https://github.com/arkottke/strata/releases/download/${GITHUB_REF_NAME}/Strata-${GITHUB_REF_NAME}-macos.dmg"

          # Download DMG and compute sha256
          curl -L -o strata.dmg "$DMG_URL"
          SHA256=$(sha256sum strata.dmg | awk '{print $1}')

          # Clone the tap repo
          git clone "https://x-access-token:${GH_TOKEN}@github.com/arkottke/homebrew-strata.git"
          cd homebrew-strata

          # Update the cask file
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Casks/strata.rb
          sed -i "s/sha256 .*/sha256 \"${SHA256}\"/" Casks/strata.rb

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/strata.rb
          git commit -m "Update strata to ${VERSION}"
          git push
