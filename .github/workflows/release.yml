name: Release

on:
  push:
    branches:
      - dev
  release:
    types: [created, published]

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Install Qt6 and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            libgsl-dev \
            qt6-base-dev \
            libqt6svg6-dev \
            qt6-tools-dev \
            libgl1-mesa-dev \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-keysyms1 \
            libxcb-shape0 \
            fuse \
            file

      - name: Cache Qwt-Qt6
        id: cache-qwt
        uses: actions/cache@v5
        with:
          path: ~/qwt-qt6-install
          key: ${{ runner.os }}-qwt-qt6-6.3.0

      - name: Build Qwt-Qt6
        if: steps.cache-qwt.outputs.cache-hit != 'true'
        run: |
          cd ~
          wget https://downloads.sourceforge.net/project/qwt/qwt/6.3.0/qwt-6.3.0.tar.bz2
          tar xjf qwt-6.3.0.tar.bz2
          cd qwt-6.3.0
          /usr/lib/qt6/bin/qmake qwt.pro
          make -j$(nproc)
          # Use INSTALL_ROOT to redirect install to a writable staging directory
          make install INSTALL_ROOT=$HOME/qwt-staging
          # Copy from staging to expected cache location
          cp -a $HOME/qwt-staging/usr/local/qwt-6.3.0 $HOME/qwt-qt6-install

      - name: Build Strata
        run: |
          mkdir build
          cd build
          cmake .. \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="~/qwt-qt6-install" \
            -DQWT_INCLUDE_DIR="$HOME/qwt-qt6-install/include" \
            -DQWT_LIBRARY="$HOME/qwt-qt6-install/lib/libqwt.so" \
            -DCMAKE_INSTALL_PREFIX=AppDir
          cmake --build . --parallel
          cmake --install .

      - name: Create AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd build
          wget -c "https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage"
          chmod +x linuxdeployqt-continuous-x86_64.AppImage
          export VERSION=$(git describe --tags --always)
          export PATH=/usr/lib/qt6/bin:$PATH
          export LD_LIBRARY_PATH=$HOME/qwt-qt6-install/lib:$LD_LIBRARY_PATH
          ./linuxdeployqt-continuous-x86_64.AppImage \
            AppDir/usr/bin/strata \
            -appimage \
            -bundle-non-qt-libs \
            -extra-plugins=iconengines,platformthemes/libqgtk3.so

      - name: Create tarball
        run: |
          cd build
          export VERSION=$(git describe --tags --always)
          tar czf Strata-${VERSION}-linux-x86_64.tar.gz -C AppDir/usr .

      - name: Create portable tarball (no FUSE needed)
        run: |
          cd build
          export VERSION=$(git describe --tags --always)
          # Extract AppImage so it can run without FUSE (e.g., in VMs)
          chmod +x Strata-${VERSION}-x86_64.AppImage
          ./Strata-${VERSION}-x86_64.AppImage --appimage-extract
          mv squashfs-root Strata-${VERSION}-portable
          # Add a convenience launcher script
          cat > Strata-${VERSION}-portable/strata.sh << 'LAUNCHER'
          #!/bin/sh
          HERE="$(cd "$(dirname "$0")" && pwd)"
          # Use software rendering if no GPU is available (e.g., in VMs)
          if ! glxinfo -B 2>/dev/null | grep -q "direct rendering: Yes"; then
            export LIBGL_ALWAYS_SOFTWARE=1
          fi
          exec "$HERE/AppRun" "$@"
          LAUNCHER
          chmod +x Strata-${VERSION}-portable/strata.sh
          tar czf Strata-${VERSION}-linux-x86_64-portable.tar.gz Strata-${VERSION}-portable

      - name: Upload AppImage to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: build/Strata-*-x86_64.AppImage

      - name: Upload tarball to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: build/Strata-*-linux-x86_64.tar.gz

      - name: Upload portable tarball to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: build/Strata-*-linux-x86_64-portable.tar.gz

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: strata-linux
          path: |
            build/Strata-*-x86_64.AppImage
            build/Strata-*-linux-x86_64.tar.gz
            build/Strata-*-linux-x86_64-portable.tar.gz

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v5

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.2'
          arch: 'win64_msvc2019_64'
          tools: 'tools_ifw'

      - name: Cache dependencies
        id: cache-deps
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/deps
          key: ${{ runner.os }}-qt6-deps-v2

      - name: Build dependencies (Qwt & GSL)
        if: steps.cache-deps.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          mkdir deps
          cd deps

          # Build GSL
          git clone https://github.com/ampl/gsl.git
          cd gsl
          git submodule update --init --recursive
          mkdir build
          cd build
          cmake .. `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DGSL_DISABLE_WARNINGS:BOOL=ON `
            -DBUILD_SHARED_LIBS:BOOL=ON `
            -DMSVC_RUNTIME_DYNAMIC:BOOL=ON `
            -DCMAKE_BUILD_TYPE=Release `
            -DGSL_DISABLE_TESTS=1 `
            -DNO_AMPL_BINDINGS=1 `
            -DDOCUMENTATION=OFF
          cmake --build . --config Release
          cmake --install . --prefix "C:/GSL"
          cd ../../..

          # Build Qwt
          cd deps
          git clone --depth 1 --branch v6.3.0 https://git.code.sf.net/p/qwt/git qwt-6.3.0
          cd qwt-6.3.0
          qmake CONFIG+=release qwt.pro
          nmake
          nmake install
          # Rename from -dev suffix to expected path
          Rename-Item "C:\Qwt-6.3.0-dev" "C:\Qwt-6.3.0"

      - name: Install dependencies
        shell: pwsh
        run: |
          cd deps/gsl/build
          cmake --install . --prefix "C:/GSL"

          # Install Qwt from cached build (nmake install is unreliable from cache)
          $qwtDir = "C:\Qwt-6.3.0"
          if (Test-Path $qwtDir) { Remove-Item -Recurse -Force $qwtDir }
          New-Item -ItemType Directory -Path "$qwtDir\include" -Force | Out-Null
          New-Item -ItemType Directory -Path "$qwtDir\lib" -Force | Out-Null
          Push-Location ${{ github.workspace }}/deps/qwt-6.3.0
          Copy-Item "src\*.h" -Destination "$qwtDir\include\"
          Copy-Item "lib\qwt.lib" -Destination "$qwtDir\lib\"
          Copy-Item "lib\qwt.dll" -Destination "$qwtDir\lib\"
          Pop-Location

          # Verify Qwt headers are present
          if (-not (Test-Path "$qwtDir\include\qwt_plot.h")) {
            Write-Error "Qwt headers not found at $qwtDir\include\"
            exit 1
          }
          Write-Host "Qwt installed: $(Get-ChildItem $qwtDir\include\*.h | Measure-Object | Select-Object -ExpandProperty Count) headers"

      - name: Build Strata
        shell: pwsh
        run: |
          $VERSION = git describe --tags --always
          mkdir build
          cd build
          cmake .. `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DQT_DIR="${{ env.Qt6_DIR }}" `
            -DQWT_ROOT_DIR="C:/Qwt-6.3.0" `
            -DQWT_INCLUDE_DIR="C:/Qwt-6.3.0/include" `
            -DQWT_LIBRARY="C:/Qwt-6.3.0/lib/qwt.lib" `
            -DGSL_ROOT_DIR="C:/GSL" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX=install
          cmake --build . --config Release --parallel
          cmake --install . --config Release

      - name: Deploy Qt dependencies
        shell: pwsh
        run: |
          cd build/install
          & windeployqt.exe --release --no-translations strata.exe

      - name: Copy runtime dependencies
        shell: pwsh
        run: |
          $VERSION = git describe --tags --always
          cd build/install
          Copy-Item "C:/Qwt-6.3.0/lib/qwt.dll" -Destination "."
          Copy-Item "C:/GSL/bin/*.dll" -Destination "."
          # Ensure Windows style plugin is present for native appearance
          if (-not (Test-Path "plugins/styles")) { New-Item -ItemType Directory -Path "plugins/styles" -Force }
          Get-ChildItem "${{ env.QT_ROOT_DIR }}/plugins/styles/*.dll" -Exclude "*d.dll" | Copy-Item -Destination "plugins/styles/"

      - name: Create ZIP archive
        shell: pwsh
        run: |
          $VERSION = git describe --tags --always
          Compress-Archive -Path build/install/* -DestinationPath "Strata-${VERSION}-windows-x64.zip"

      - name: Create installer with NSIS
        shell: pwsh
        run: |
          $VERSION = git describe --tags --always
          choco install nsis -y
          # Prepare installer files
          mkdir installer-temp
          Copy-Item -Recurse build/install/* installer-temp/
          # Create basic NSIS script for Qt6
          @"
          !define PRODUCT_NAME "Strata"
          !define PRODUCT_VERSION "$VERSION"
          !define PRODUCT_PUBLISHER "Albert Kottke"

          OutFile "Strata-${VERSION}-windows-x64-installer.exe"
          InstallDir "`$PROGRAMFILES64\Strata"

          Section "Main"
            SetOutPath "`$INSTDIR"
            File /r "installer-temp\*.*"
            CreateDirectory "`$SMPROGRAMS\Strata"
            CreateShortcut "`$SMPROGRAMS\Strata\Strata.lnk" "`$INSTDIR\bin\strata.exe"
            WriteUninstaller "`$INSTDIR\Uninstall.exe"
          SectionEnd

          Section "Uninstall"
            Delete "`$INSTDIR\Uninstall.exe"
            RMDir /r "`$INSTDIR"
            Delete "`$SMPROGRAMS\Strata\Strata.lnk"
            RMDir "`$SMPROGRAMS\Strata"
          SectionEnd
          "@ | Out-File -Encoding ASCII installer.nsi

          & "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi

      - name: Upload installer to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: Strata-*-windows-x64-installer.exe

      - name: Upload archive to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: Strata-*-windows-x64.zip

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: strata-windows-installer
          path: Strata-*-windows-x64-installer.exe

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: strata-windows-zip
          path: build/install/*

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          brew install qt@6 gsl cmake ninja
          brew link qt@6

      - name: Cache Qwt-Qt6
        id: cache-qwt
        uses: actions/cache@v5
        with:
          path: ~/qwt-qt6-install
          key: ${{ runner.os }}-qwt-qt6-6.3.0-no-framework

      - name: Build Qwt-Qt6
        if: steps.cache-qwt.outputs.cache-hit != 'true'
        run: |
          cd ~
          curl -L https://downloads.sourceforge.net/project/qwt/qwt/6.3.0/qwt-6.3.0.tar.bz2 -o qwt-6.3.0.tar.bz2
          tar xjf qwt-6.3.0.tar.bz2
          cd qwt-6.3.0
          # Disable framework build so Qwt installs as a plain dylib
          sed -i '' '/QwtFramework/d' qwtconfig.pri
          $(brew --prefix qt@6)/bin/qmake qwt.pro
          make -j$(sysctl -n hw.ncpu)
          # Use INSTALL_ROOT to redirect install to a writable staging directory
          make install INSTALL_ROOT=$HOME/qwt-staging
          # Copy from staging to expected cache location
          cp -a $HOME/qwt-staging/usr/local/qwt-6.3.0 $HOME/qwt-qt6-install

      - name: Build Strata
        run: |
          export Qt6_DIR=$(brew --prefix qt@6)/lib/cmake/Qt6
          export VERSION=$(git describe --tags --always)

          mkdir build
          cd build
          cmake .. \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="~/qwt-qt6-install;$(brew --prefix qt@6)" \
            -DQWT_INCLUDE_DIR="$HOME/qwt-qt6-install/include" \
            -DQWT_LIBRARY="$HOME/qwt-qt6-install/lib/libqwt.dylib" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0
          cmake --build . --parallel

      - name: Create .app bundle
        run: |
          cd build
          export VERSION=$(git describe --tags --always)

          # CMake builds strata.app due to MACOSX_BUNDLE; rename to Strata.app
          cp -a source/strata.app Strata.app

          # Deploy Qt dependencies (no QML — Strata is a pure Widgets app)
          $(brew --prefix qt@6)/bin/macdeployqt Strata.app -always-overwrite

          # Remove QML frameworks that macdeployqt pulls in unnecessarily
          rm -rf Strata.app/Contents/Frameworks/QtQml*.framework
          rm -rf Strata.app/Contents/Frameworks/QtQuick*.framework
          rm -rf Strata.app/Contents/Resources/qml

          # Copy Qwt and GSL libraries
          mkdir -p Strata.app/Contents/Frameworks
          cp ~/qwt-qt6-install/lib/libqwt.6.dylib Strata.app/Contents/Frameworks/
          cp $(brew --prefix gsl)/lib/libgsl.dylib Strata.app/Contents/Frameworks/
          cp $(brew --prefix gsl)/lib/libgslcblas.dylib Strata.app/Contents/Frameworks/

          STRATA_BIN=Strata.app/Contents/MacOS/strata
          FW=Strata.app/Contents/Frameworks

          # Fix Qwt path in main binary
          install_name_tool -change ~/qwt-qt6-install/lib/libqwt.6.dylib \
            @executable_path/../Frameworks/libqwt.6.dylib \
            "$STRATA_BIN"

          # Fix GSL paths in main binary
          GSL_PREFIX=$(brew --prefix gsl)
          for lib in libgsl.dylib libgslcblas.dylib; do
            install_name_tool -change "${GSL_PREFIX}/lib/${lib}" \
              "@executable_path/../Frameworks/${lib}" \
              "$STRATA_BIN"
          done

          # Fix libgslcblas reference inside libgsl
          install_name_tool -change "${GSL_PREFIX}/lib/libgslcblas.dylib" \
            "@executable_path/../Frameworks/libgslcblas.dylib" \
            "$FW/libgsl.dylib"

          # Fix Qwt's own dylib id and its Qt dependencies
          install_name_tool -id @executable_path/../Frameworks/libqwt.6.dylib \
            "$FW/libqwt.6.dylib"

          # Fix GSL dylib ids
          install_name_tool -id @executable_path/../Frameworks/libgsl.dylib \
            "$FW/libgsl.dylib"
          install_name_tool -id @executable_path/../Frameworks/libgslcblas.dylib \
            "$FW/libgslcblas.dylib"

          # Ad-hoc code sign (required for Apple Silicon, helps on Intel)
          # Sign frameworks and dylibs individually first, then the app bundle last
          find Strata.app/Contents/Frameworks -name '*.framework' -maxdepth 1 | while read fw; do
            codesign --force --sign - "$fw"
          done
          find Strata.app/Contents/Frameworks -name '*.dylib' -maxdepth 1 | while read dl; do
            codesign --force --sign - "$dl"
          done
          codesign --force --sign - Strata.app

      - name: Create DMG
        run: |
          cd build
          export VERSION=$(git describe --tags --always)

          # Create temporary DMG directory
          mkdir dmg-temp
          cp -r Strata.app dmg-temp/
          ln -s /Applications dmg-temp/Applications

          # Create DMG
          hdiutil create -volname "Strata" -srcfolder dmg-temp -ov -format UDZO "Strata-${VERSION}-macos.dmg"

      - name: Create tarball
        run: |
          cd build
          export VERSION=$(git describe --tags --always)
          tar czf "Strata-${VERSION}-macos.tar.gz" Strata.app

      - name: Upload DMG to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: build/Strata-*-macos.dmg

      - name: Upload tarball to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: build/Strata-*-macos.tar.gz

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: strata-macos
          path: |
            build/Strata-*-macos.dmg
            build/Strata-*-macos.tar.gz

  # Smoke tests: verify built artifacts can actually launch
  test-linux:
    needs: build-linux
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: strata-linux

      - name: Test AppImage (with FUSE)
        run: |
          sudo apt-get update && sudo apt-get install -y fuse libfuse2
          chmod +x Strata-*-x86_64.AppImage
          # Use virtual framebuffer since there's no display
          export QT_QPA_PLATFORM=offscreen
          ./Strata-*-x86_64.AppImage --help || true
          echo "AppImage launched successfully"

      - name: Test portable tarball (no FUSE, simulates VM)
        run: |
          tar xzf Strata-*-linux-x86_64-portable.tar.gz
          export QT_QPA_PLATFORM=offscreen
          export LIBGL_ALWAYS_SOFTWARE=1
          ./Strata-*-portable/AppRun --help || true
          echo "Portable bundle launched successfully"

  test-linux-minimal:
    needs: build-linux
    runs-on: ubuntu-22.04
    container:
      image: ubuntu:22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: strata-linux

      - name: Test portable tarball in minimal container (simulates VM without FUSE)
        run: |
          apt-get update && apt-get install -y libgl1-mesa-glx libegl1-mesa libxcb-xinerama0 libxkbcommon0
          tar xzf Strata-*-linux-x86_64-portable.tar.gz
          export QT_QPA_PLATFORM=offscreen
          export LIBGL_ALWAYS_SOFTWARE=1
          ./Strata-*-portable/AppRun --help || true
          echo "Portable bundle works in minimal container"

  test-macos:
    needs: build-macos
    runs-on: macos-14
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: strata-macos

      - name: Test .app bundle from tarball
        run: |
          tar xzf Strata-*-macos.tar.gz
          # Verify code signature
          codesign --verify --strict Strata.app
          echo "Code signature valid"
          # Verify all dylibs resolve
          otool -L Strata.app/Contents/MacOS/strata
          # Check no references to build-machine paths remain
          if otool -L Strata.app/Contents/MacOS/strata | grep -E '/usr/local|/opt/homebrew|/Users'; then
            echo "ERROR: Found absolute paths to build machine libraries"
            exit 1
          fi
          # Launch test (offscreen since CI has no display)
          export QT_QPA_PLATFORM=offscreen
          ./Strata.app/Contents/MacOS/strata --help || true
          echo "macOS app launched successfully"

      - name: Verify DMG mounts
        run: |
          hdiutil attach Strata-*-macos.dmg -mountpoint /tmp/strata-dmg
          ls -la /tmp/strata-dmg/Strata.app
          codesign --verify --strict /tmp/strata-dmg/Strata.app
          hdiutil detach /tmp/strata-dmg

  test-windows:
    needs: build-windows
    runs-on: windows-2022
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: strata-windows-zip

      - name: Test executable launches
        shell: pwsh
        run: |
          # Verify the executable exists and DLLs are present
          $exe = Get-ChildItem -Recurse -Filter "strata.exe" | Select-Object -First 1
          if (-not $exe) { Write-Error "strata.exe not found"; exit 1 }
          Write-Host "Found: $($exe.FullName)"
          # List DLLs in the same directory
          Get-ChildItem $exe.DirectoryName -Filter "*.dll" | ForEach-Object { Write-Host "  DLL: $($_.Name)" }
          # Try to launch (will fail without display, but verifies DLL loading)
          $env:QT_QPA_PLATFORM = "offscreen"
          & $exe.FullName --help 2>&1 | Out-Host
          Write-Host "Windows executable launched successfully"
